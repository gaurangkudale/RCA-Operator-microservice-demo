image:
  repository: ghcr.io/gaurangkudale/rca-operator-microservice-demo-app
  tag: main
  pullPolicy: Always

loadTesterImage:
  enabled: false
  repository: ghcr.io/gaurangkudale/rca-operator-microservice-demo-load-tester
  tag: main
  pullPolicy: Always

services:
  - name: frontend
    env:
      - name: PRODUCT_CATALOG_URL
        value: "http://product-catalog:8080"
      - name: CART_URL
        value: "http://cart:8080"
      - name: CHECKOUT_URL
        value: "http://checkout:8080"

  # Baseline failure probabilities are all zero so services run clean in
  # steady state. The chaos-runner Job is the only source of injected faults;
  # it flips these knobs via POST /chaos/config per scenario and calls
  # /chaos/reset afterwards, restoring the healthy baseline.
  - name: ad-service
    env:
      - name: AD_DELAY_PROB
        value: "0"
      - name: AD_ERROR_PROB
        value: "0"

  - name: product-catalog
    env:
      - name: CATALOG_LATENCY_PROB
        value: "0"
      - name: CATALOG_ERROR_PROB
        value: "0"

  - name: cart
    env:
      - name: PRODUCT_CATALOG_URL
        value: "http://product-catalog:8080"

  - name: quote
    env:
      - name: PRODUCT_CATALOG_URL
        value: "http://product-catalog:8080"
      - name: AD_SERVICE_URL
        value: "http://ad-service:8080"
      - name: QUOTE_MISMATCH_RATE
        value: "0"

  - name: payment
    env:
      - name: PAYMENT_FAILURE_RATE
        value: "0"
      - name: PAYMENT_SLOW_PROB
        value: "0"

  - name: shipping
    env:
      - name: SHIPPING_FAILURE_RATE
        value: "0"
      - name: SHIPPING_WARNING_RATE
        value: "0"

  - name: email
    env:
      - name: EMAIL_WARNING_RATE
        value: "0"

  - name: checkout
    env:
      - name: CART_URL
        value: "http://cart:8080"
      - name: QUOTE_URL
        value: "http://quote:8080"
      - name: PAYMENT_URL
        value: "http://payment:8080"
      - name: SHIPPING_URL
        value: "http://shipping:8080"
      - name: EMAIL_URL
        value: "http://email:8080"

# Dependencies
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: library/postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: "postgres"
    postgresPassword: "password"
    database: "rca_demo"

prometheus:
  enabled: false

signoz:
  enabled: false # Disabled by default as it's heavy, enable if needed

# Phase 2 RCA-Operator test artifacts.
correlationRules:
  # Install the six sample RCACorrelationRule CRs that target OTel signals
  # emitted by the demo services (span errors, latency spikes, log matches).
  # Disable if you want to bring your own rules or test the operator's
  # zero-rule behaviour.
  enabled: true

chaosRunner:
  # The chaos runner is a one-shot Job that applies deterministic fault
  # injection to the demo services via /chaos/config, then polls
  # IncidentReport CRs to assert the operator produced the expected signals.
  # Disabled by default — enable on demand for regression testing.
  enabled: true
  image:
    repository: ghcr.io/gaurangkudale/rca-operator-microservice-demo-chaos
    tag: main
    pullPolicy: IfNotPresent
  # Leave empty to run every scenario (--all). Set to a specific scenario
  # name (e.g. "payment_outage") to run just one.
  scenario: "catalog_outage"
  # Optional identifier folded into a pod-template annotation. Bump it (e.g.
  # to `$(date +%s)`) on `helm upgrade` to force a fresh Job generation when
  # only re-running — a no-op otherwise.
  runId: ""
