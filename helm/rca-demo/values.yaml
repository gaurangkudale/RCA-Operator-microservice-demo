image:
  repository: ghcr.io/gaurangkudale/rca-operator-microservice-demo-app
  tag: main
  pullPolicy: Always

loadTesterImage:
  repository: ghcr.io/gaurangkudale/rca-operator-microservice-demo-load-tester
  tag: main
  pullPolicy: Always

services:
  - name: proxy-service
    env:
      - name: NEXT_SERVICE_URL
        value: "http://auth-service:8080"
      # New multi-service endpoints (DAG pattern - no cycles)
      - name: VALIDATE_SERVICES_URL
        value: "http://auth-service:8080, http://user-service:8080"
      - name: FETCH_SERVICES_URL
        value: "http://auth-service:8080, http://order-service:8080"
      - name: VERIFY_SERVICES_URL
        value: "http://user-service:8080, http://payment-service:8080"
      - name: CHECK_SERVICES_URL
        value: "http://auth-service:8080, http://inventory-service:8080"
  - name: auth-service
    env:
      - name: NEXT_SERVICE_URL
        value: "http://user-service:8080"
      # New multi-service endpoints
      - name: VALIDATE_SERVICES_URL
        value: "http://user-service:8080"
      - name: FETCH_SERVICES_URL
        value: "http://user-service:8080, http://order-service:8080"
      - name: VERIFY_SERVICES_URL
        value: "http://user-service:8080"
      - name: CHECK_SERVICES_URL
        value: "http://payment-service:8080"
  - name: user-service
    env:
      - name: NEXT_SERVICE_URL
        value: "http://order-service:8080"
      # New multi-service endpoints
      - name: VALIDATE_SERVICES_URL
        value: "http://payment-service:8080, http://inventory-service:8080"
      - name: FETCH_SERVICES_URL
        value: "http://order-service:8080, http://payment-service:8080"
      - name: VERIFY_SERVICES_URL
        value: "http://inventory-service:8080"
      - name: CHECK_SERVICES_URL
        value: "http://payment-service:8080, http://inventory-service:8080"
  - name: order-service
    env:
      - name: NEXT_SERVICE_URL
        value: "http://payment-service:8080"
      # New multi-service endpoints
      - name: VALIDATE_SERVICES_URL
        value: "http://payment-service:8080, http://inventory-service:8080"
      - name: FETCH_SERVICES_URL
        value: "http://payment-service:8080"
      - name: VERIFY_SERVICES_URL
        value: "http://inventory-service:8080"
      - name: CHECK_SERVICES_URL
        value: "http://inventory-service:8080"
  - name: payment-service
    env:
      - name: NEXT_SERVICE_URL
        value: "http://inventory-service:8080"
      # New multi-service endpoints
      - name: VALIDATE_SERVICES_URL
        value: "http://inventory-service:8080"
      - name: FETCH_SERVICES_URL
        value: "http://inventory-service:8080"
      - name: VERIFY_SERVICES_URL
        value: "http://inventory-service:8080"
      - name: CHECK_SERVICES_URL
        value: "http://inventory-service:8080"
  - name: inventory-service
    env: [] # End of chain - no downstream services

telemetry:
  enabled: false  # Set to true to enable OTEL auto-instrumentation
  otlpEndpoint: "http://rca-demo-jaeger-collector:4317"

# Dependencies
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: library/postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: "postgres"
    postgresPassword: "password"
    database: "rca_demo"

prometheus:
  enabled: false  # Controlled by telemetry.enabled flag

jaeger:
  enabled: false  # Controlled by telemetry.enabled flag
  allInOne:
    enabled: true
    service:
      collector:
        otlp:
          grpc:
            name: otlp-grpc
            port: 4317
          http:
            name: otlp-http
            port: 4318
  collector:
    enabled: false
  query:
    enabled: false
  agent:
    enabled: false
  provisionDataStore:
    cassandra: false
  storage:
    type: memory

signoz:
  enabled: false # Disabled by default as it's heavy, enable if needed
