apiVersion: v2
name: rca-demo-apps
description: A Helm chart for RCA Operator Phase 2 Test Microservices
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: prometheus
    version: 29.2.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: signoz
    version: 0.28.3
    repository: https://charts.signoz.io
    condition: signoz.enabled
