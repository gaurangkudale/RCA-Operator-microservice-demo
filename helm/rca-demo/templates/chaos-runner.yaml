{{- if .Values.chaosRunner.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
---
# RBAC: chaos-runner needs to read IncidentReport CRs in its own namespace to
# assert that the operator produced the expected signals. No write access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
rules:
  - apiGroups: ["rca.rca-operator.tech"]
    resources: ["incidentreports"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
subjects:
  - kind: ServiceAccount
    name: chaos-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-runner
---
# Plain (non-hook) Job. Kept out of Helm hooks so it doesn't block `helm
# install` on a long chaos run and so the Job object (and its logs) remain
# visible after completion.
#
# Re-run with:
#   kubectl -n rca-demo delete job chaos-runner --ignore-not-found
#   helm upgrade rca-demo ./helm/rca-demo -n rca-demo \
#     --set chaosRunner.enabled=true \
#     --set chaosRunner.runId=$(date +%s)
#
# The runId is folded into a pod-template annotation so `helm upgrade` always
# produces a new Job generation even when only the run identifier changes.
apiVersion: batch/v1
kind: Job
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: chaos-runner
        app.kubernetes.io/component: chaos-runner
        app.kubernetes.io/part-of: rca-demo
      annotations:
        # Opt out of auto-instrumentation — the runner is a test harness, not
        # a traced workload, and its spans would pollute the correlator.
        instrumentation.opentelemetry.io/inject-python: "false"
        rca-demo/run-id: {{ .Values.chaosRunner.runId | default "static" | quote }}
    spec:
      serviceAccountName: chaos-runner
      restartPolicy: Never
      containers:
        - name: chaos-runner
          image: "{{ .Values.chaosRunner.image.repository }}:{{ .Values.chaosRunner.image.tag }}"
          imagePullPolicy: {{ .Values.chaosRunner.image.pullPolicy }}
          args:
            {{- if .Values.chaosRunner.scenario }}
            - "--scenario"
            - {{ .Values.chaosRunner.scenario | quote }}
            {{- else }}
            - "--all"
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
