{{- if .Values.chaosRunner.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
---
# RBAC: chaos-runner needs to read IncidentReport CRs in its own namespace to
# assert that the operator produced the expected signals. No write access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
rules:
  - apiGroups: ["rca.rca-operator.tech"]
    resources: ["incidentreports"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
subjects:
  - kind: ServiceAccount
    name: chaos-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-runner
---
# One-shot Job. Re-run with:
#   kubectl -n rca-demo delete job chaos-runner --ignore-not-found
#   helm upgrade rca-demo ./helm/rca-demo -n rca-demo
# Or on demand:
#   kubectl -n rca-demo create job chaos-runner-$(date +%s) --from=cronjob/chaos-runner  # if cron
apiVersion: batch/v1
kind: Job
metadata:
  name: chaos-runner
  labels:
    app.kubernetes.io/component: chaos-runner
    app.kubernetes.io/part-of: rca-demo
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "50"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: chaos-runner
        app.kubernetes.io/component: chaos-runner
        app.kubernetes.io/part-of: rca-demo
      annotations:
        # Opt out of auto-instrumentation — the runner is a test harness, not
        # a traced workload, and its spans would pollute the correlator.
        instrumentation.opentelemetry.io/inject-python: "false"
    spec:
      serviceAccountName: chaos-runner
      restartPolicy: Never
      containers:
        - name: chaos-runner
          image: "{{ .Values.chaosRunner.image.repository }}:{{ .Values.chaosRunner.image.tag }}"
          imagePullPolicy: {{ .Values.chaosRunner.image.pullPolicy }}
          args:
            {{- if .Values.chaosRunner.scenario }}
            - "--scenario"
            - {{ .Values.chaosRunner.scenario | quote }}
            {{- else }}
            - "--all"
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
