name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build App Image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: false
          tags: rca-demo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Load Tester Image
        uses: docker/build-push-action@v5
        with:
          context: ./load-tester
          push: false
          tags: rca-demo-load-tester:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-helm:
    name: Lint and Package Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.13.2'

      - name: Add Helm Dependency Repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
          helm repo add signoz https://charts.signoz.io
          helm repo update

      - name: Update Helm Dependencies
        run: helm dependency update ./helm/rca-demo

      - name: Lint Helm Chart
        run: helm lint ./helm/rca-demo

      - name: Package Helm Chart
        run: helm package ./helm/rca-demo

      - name: Upload Helm Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: rca-demo-apps-*.tgz
          retention-days: 7
